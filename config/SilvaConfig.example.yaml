# ============================================================================
# Silva 站点配置示例 / Silva site configuration example
# ============================================================================
# 使用方式 / How to use:
# 1. 复制此文件并重命名为 `SilvaConfig.yaml` / Copy this file and rename it to `SilvaConfig.yaml`
# 2. 按站点实际信息修改配置项 / Adjust the configuration for your site
# 3. 应用启动时会自动读取 SilvaConfig.yaml / The app reads SilvaConfig.yaml automatically at startup
# ============================================================================

# ----------------------------------------------------------------------------
# 站点基础信息 / Basic site information
# ----------------------------------------------------------------------------
site:
  # 默认站点所有者名称 / Default site owner name
  # 没有匹配的本地化名称时使用 / Used when no localized name matches
  name: "示例"

  # 简体中文显示名称 / Simplified Chinese display name
  # 当前语言为中文时优先显示 / Preferred when the current language is Chinese
  name_zh: "示例"

  # 英文显示名称 / English display name
  # 当前语言为英文时优先显示 / Preferred when the current language is English
  name_en: "example"

  # 首页座右铭 / Homepage motto
  # 首页展示的一句简短介绍 / Short description shown on the homepage
  motto: "example motto goes here."

  # 配置建议 / Configuration tips:
  # - 建议名称长度：中文 5 字以内，英文 10 字以内 / Recommended length: Chinese within 5 chars, English within 10 chars
  # - 单语言站点只需要保留 name / For a single-language site, keep only "name"

# ----------------------------------------------------------------------------
# 社交链接列表 / Social link list
# ----------------------------------------------------------------------------
links:
  # GitHub 主页链接 / GitHub profile link
  - type: "github"
    url: "https://github.com/yourusername"

  # Twitter/X 主页链接 / Twitter/X profile link
  - type: "twitter"
    url: "https://twitter.com/yourusername"

  # 联系邮箱链接 / Contact email link
  - type: "email"
    url: "mailto:your@email.com"

  # Telegram 主页链接 / Telegram profile link
  - type: "telegram"
    url: "https://t.me/yourusername"

  # 链接配置说明 / Link configuration notes:
  # - 当前支持类型 / Currently supported types: github, twitter, email, telegram
  # - 可删除不需要展示的链接 / Remove links that should not be displayed

# ----------------------------------------------------------------------------
# 备案信息列表 / Filing information list
# ----------------------------------------------------------------------------
filings:
  # ICP 备案链接 / ICP filing link
  - name: "京ICP备xxxxxxxx号"
    url: "https://beian.miit.gov.cn/"

  # 公安备案链接 / Public security filing link
  - name: "京公网安备xxxxxxxx号"
    url: "http://www.beian.gov.cn/portal/registerSystemInfo"

  # 备案配置说明 / Filing configuration notes:
  # - 无备案信息时可删除整个 filings 部分 / Remove the entire filings section when filing info is not needed
  # - 可按需添加多条备案记录 / Add multiple filing entries when needed
  # - 将 xxxxxxxx 替换为真实备案号 / Replace xxxxxxxx with the actual filing number

# ----------------------------------------------------------------------------
# 文章分类列表 / Post category list
# ----------------------------------------------------------------------------
categories:
  # 默认分类名称 / Default category name
  - name: "技术"
    # 中文分类名称 / Chinese category name
    name_zh: "技术"
    # 英文分类名称 / English category name
    name_en: "Tech"
    # URL 分类标识 / URL category slug
    slug: "tech"
  - name: "进阶"
    name_zh: "进阶"
    name_en: "Advanced"
    slug: "advanced"
  - name: "国际化"
    name_zh: "国际化"
    name_en: "i18n"
    slug: "i18n"
    # 分类配置说明 / Category configuration notes:
    # - 分类名称建议简短，slug 会用于 URL，推荐英文且不含空格 / Keep category names concise; slug is used in URLs and should be English without spaces
    # - name 为必填项，name_zh 和 name_en 缺失时回退到 name / name is required; name_zh and name_en fall back to name when missing
    # - 可继续追加更多分类 / Add more categories as needed

# ----------------------------------------------------------------------------
# SEO 元数据 / SEO metadata
# ----------------------------------------------------------------------------
seo:
  # SEO 网站标题 / SEO site title
  # 用于浏览器标签页和搜索结果 / Used in browser tabs and search results
  title: "示例网站标题"

  # SEO 网站名称 / SEO site name
  # 用于 Open Graph 与社交平台分享 / Used for Open Graph and social sharing
  site_name: "示例网站"

  # SEO 网站描述 / SEO site description
  # 用于搜索摘要和社交分享摘要 / Used in search snippets and social sharing summaries
  description: "这是一个示例网站描述，介绍网站的主要内容和特色。"

  # 默认语言 / Default language
  # 站点默认展示语言 / Default display language for the site
  # 可选值 / Available values: zh-CN (简体中文), en-US (American English)
  locale: "zh-CN"

  # 规范化站点地址 / Canonical site URL
  # 用于 SEO 的主域名 / Main domain used for SEO
  canonical: "https://example.com"

  # 内容作者 / Content author
  # 站点内容作者或所有者 / Author or owner of the site content
  author: "示例作者"

  # 浏览器主题色 / Browser theme color
  # 用于浏览器地址栏和任务切换器 / Used in the browser address bar and task switcher
  # 格式为十六进制颜色代码 / Format is a hex color code
  theme_color: "#7bf1a8"

  # Open Graph 分享配置 / Open Graph sharing configuration
  # 控制社交平台分享卡片展示 / Controls social platform sharing cards
  og:
    # Open Graph 标题 / Open Graph title
    # 社交分享卡片标题 / Title shown in social sharing cards
    title: "示例网站 - 副标题"

    # Open Graph 描述 / Open Graph description
    # 社交分享卡片描述 / Description shown in social sharing cards
    description: "这是社交媒体分享时显示的描述文本。"

    # Open Graph 类型 / Open Graph type
    # 常见值 / Common values: website, article, profile
    type: "website"

    # Open Graph 分享图片 / Open Graph share image
    # 需要替换为真实图片 URL / Replace with the real image URL
    # 推荐图片尺寸：1200x630 像素 / Recommended image size: 1200x630 pixels
    image: "https://example.com/og-image.jpg"

  # Twitter/X 卡片配置 / Twitter/X card configuration
  # 控制 Twitter/X 平台分享展示 / Controls sharing display on Twitter/X
  twitter:
    # Twitter/X 站点账号 / Twitter/X site account
    # 格式为 @username / Format is @username
    site: "@yourusername"

    # Twitter/X 内容创作者账号 / Twitter/X creator account
    # 格式为 @username / Format is @username
    creator: "@yourusername"

    # Twitter/X 卡片类型 / Twitter/X card type
    # 按实际分享样式选择 / Choose based on the desired sharing style
    # 常见值 / Common values: summary, summary_large_image
    card: "summary_large_image"
