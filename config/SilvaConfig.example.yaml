# ============================================================================
# Silva 配置文件示例
# Silva Configuration File Example
# ============================================================================
# 使用说明 / Usage Instructions:
# 1. 复制此文件并重命名为 `SilvaConfig.yaml` / Copy this file and rename to `SilvaConfig.yaml`
# 2. 根据需要修改配置项 / Modify configuration items as needed
# 3. 应用会自动读取 SilvaConfig.yaml 文件 / App will automatically read SilvaConfig.yaml
# ============================================================================

# ----------------------------------------------------------------------------
# 网站信息配置
# Site Information Configuration
# ----------------------------------------------------------------------------
site:
  # 网站所有者名称（默认）/ Site owner name (default)
  # 当没有匹配的语言特定名称时使用 / Used when no language-specific name matches
  name: "示例"

  # 中文名称 / Chinese name
  # 当用户语言为中文时显示 / Displayed when user language is Chinese
  name_zh: "示例"

  # 英文名称 / English name
  # 当用户语言为英文时显示 / Displayed when user language is English
  name_en: "example"

  # 座右铭 / Motto
  # 网站首页显示的简短描述 / A brief description displayed on the homepage
  motto: "example motto goes here."

  # 注意事项 / Notes:
  # - 建议名称长度：中文 5 字符以内，英文 10 字符以内
  #   Recommended length: Chinese within 5 chars, English within 10 chars
  # - 如果只使用一种语言，只保留 name 即可
  #   If using only one language, keep only "name"

# ----------------------------------------------------------------------------
# 社交链接配置
# Social Links Configuration
# ----------------------------------------------------------------------------
links:
  # GitHub 链接 / GitHub link
  - type: "github"
    url: "https://github.com/yourusername"

  # Twitter/X 链接 / Twitter/X link
  - type: "twitter"
    url: "https://twitter.com/yourusername"

  # 电子邮件 / Email
  - type: "email"
    url: "mailto:your@email.com"

  # Telegram 链接 / Telegram link
  - type: "telegram"
    url: "https://t.me/yourusername"

  # 注意事项 / Notes:
  # - 支持的类型 / Supported types: github, twitter, email, telegram
  # - 可以删除不需要的链接 / Can remove unwanted links
