# pnpm 构建脚本白名单 / pnpm build script allowlist
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  sharp: true
  unrs-resolver: true

# 已单独处理的依赖构建脚本 / Dependency build scripts handled separately
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

# 允许立即安装的发布包 / Published packages allowed without release-age delay
minimumReleaseAgeExclude:
  - generate-license-file@4.2.1
