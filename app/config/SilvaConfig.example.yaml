# Customize this template, then rename it to `SilvaConfig.yaml` so the app picks it up.
# 定制完成后务必将文件更名为 `SilvaConfig.yaml`，否则程序无法读取配置。
site:
  # Enter the display name for each language as needed. Unnecessary language keys can be removed. If only one language is used, keep only the “name” key.
  # 按需填写多语言展示名称，不需要的语言键可以删除，如果只有一种语言的话只保留"name"即可
  # Keep each name within three characters to avoid layout glitches on the navbar.
  # 单个名字请控制在中文五个字符以内，防止导航栏排版错乱。
  name: "示例"
  name_zh: "示例"
  name_en: "example"
